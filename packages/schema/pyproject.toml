[project]
name = "stratlab-schema"
version = "0.1.0"
description = "Strategy DSL for StratLab — Pydantic schema, enums, sanity checks."
requires-python = ">=3.13"
dependencies = [
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["stratlab_schema"]
