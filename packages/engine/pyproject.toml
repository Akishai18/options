[project]
name = "stratlab-engine"
version = "0.1.0"
description = "Backtest engine for StratLab — vectorized, schema-driven, look-ahead-safe."
requires-python = ">=3.13"
dependencies = [
    "stratlab-schema",
    "pandas>=2.2",
    "numpy>=2.0",
    "pyarrow>=17.0",
    "ccxt>=4.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["stratlab_engine"]
